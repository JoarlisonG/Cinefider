<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineFinder</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --verde: #00ff9c;
      --azul: #00b8ff;
      --vermelho: #ff4757;
      --roxo: #a855f7;
      --bg: #080810;
      --card: rgba(255,255,255,0.04);
      --borda: rgba(0,255,156,0.15);
      --texto: #e8e8f0;
      --texto2: #888899;
      --accent: var(--verde);
    }

    /* modo série muda o accent para roxo */
    body.modo-serie {
      --accent: var(--roxo);
      --borda: rgba(168,85,247,0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--texto);
      min-height: 100vh;
      padding: 24px 16px 60px;
      overflow-x: hidden;
      transition: --accent .3s;
    }

    /* === FUNDO === */
    .bg-orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; animation: orbFloat 12s ease-in-out infinite; transition: background .6s; }
    .orb1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; animation-delay: 0s; }
    .orb2 { width: 300px; height: 300px; background: var(--azul); bottom: -80px; right: -80px; animation-delay: -4s; }
    .orb3 { width: 200px; height: 200px; background: var(--vermelho); top: 50%; left: 50%; animation-delay: -8s; }
    @keyframes orbFloat {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(30px,-30px) scale(1.05); }
      66%      { transform: translate(-20px,20px) scale(0.95); }
    }

    /* === LAYOUT === */
    .app { max-width: 460px; margin: 0 auto; position: relative; z-index: 1; }

    /* === HEADER === */
    .header { text-align: center; margin-bottom: 22px; }
    .logo {
      font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 4px;
      background: linear-gradient(135deg, var(--verde), var(--azul));
      -webkit-background-clip: text; background-clip: text; color: transparent; line-height: 1;
      display: flex; align-items: center; justify-content: center; gap: 12px;
    }
    .logo svg { width: 34px; height: 34px; flex-shrink: 0; }
    .tagline { font-size: 0.72rem; color: var(--texto2); letter-spacing: 3px; text-transform: uppercase; margin-top: 6px; }

    /* === ABAS FILMES / SÉRIES === */
    .tabs {
      display: flex; gap: 0; margin-bottom: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 4px; overflow: hidden;
    }
    .tab {
      flex: 1; padding: 11px 16px; border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.85rem;
      cursor: pointer; transition: all .25s; letter-spacing: 1px; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: transparent; color: var(--texto2);
    }
    .tab svg { width: 15px; height: 15px; }
    .tab.ativo-filme {
      background: linear-gradient(135deg, rgba(0,255,156,0.2), rgba(0,184,255,0.15));
      color: var(--verde);
      box-shadow: 0 2px 12px rgba(0,255,156,0.15);
    }
    .tab.ativo-serie {
      background: linear-gradient(135deg, rgba(168,85,247,0.25), rgba(99,102,241,0.15));
      color: var(--roxo);
      box-shadow: 0 2px 12px rgba(168,85,247,0.2);
    }

    /* === CARD === */
    .card {
      background: var(--card); border: 1px solid var(--borda);
      border-radius: 20px; padding: 20px; margin-bottom: 14px;
      backdrop-filter: blur(12px); transition: border-color .3s;
    }
    .card-title {
      font-size: 0.68rem; text-transform: uppercase; letter-spacing: 2.5px;
      color: var(--accent); margin-bottom: 14px; font-weight: 600;
      display: flex; align-items: center; gap: 7px; transition: color .3s;
    }
    .card-title svg { width: 14px; height: 14px; opacity: 0.85; }

    /* === SELECTS === */
    .filtros-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    select {
      width: 100%; padding: 10px 14px; border-radius: 12px;
      background: rgba(255,255,255,0.06); color: var(--texto);
      border: 1px solid rgba(255,255,255,0.1); outline: none;
      font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
      cursor: pointer; transition: border-color .2s;
    }
    select:focus { border-color: var(--accent); }
    select option { background: #131320; }

    /* === FILTRO DE ANO === */
    .ano-wrap {
      margin-bottom: 14px;
    }
    .ano-label {
      font-size: 0.78rem; color: var(--texto2); margin-bottom: 7px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .ano-label strong { color: var(--accent); font-weight: 600; transition: color .3s; }
    .ano-inputs { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; }
    .ano-sep { font-size: 0.75rem; color: var(--texto2); text-align: center; letter-spacing: 1px; }
    .ano-input-wrap { position: relative; }
    .ano-input-wrap input[type=number] {
      width: 100%; padding: 10px 14px; border-radius: 12px;
      background: rgba(255,255,255,0.06); color: var(--texto);
      border: 1px solid rgba(255,255,255,0.1); outline: none;
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600;
      transition: border-color .2s; text-align: center;
      -moz-appearance: textfield;
    }
    .ano-input-wrap input[type=number]::-webkit-inner-spin-button,
    .ano-input-wrap input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .ano-input-wrap input[type=number]:focus { border-color: var(--accent); }
    .ano-input-wrap input[type=number].erro { border-color: var(--vermelho) !important; }
    .ano-erro { font-size: 0.7rem; color: var(--vermelho); margin-top: 6px; display: none; }
    .ano-erro.show { display: block; }

    /* === RANGE === */
    .nota-label {
      font-size: 0.78rem; color: var(--texto2); margin-bottom: 7px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .nota-label strong { color: var(--accent); font-weight: 600; font-size: 0.9rem; transition: color .3s; }
    input[type=range] {
      width: 100%; height: 4px; -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,0.1); border-radius: 4px; outline: none; margin-bottom: 14px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
      box-shadow: 0 0 10px rgba(0,255,156,0.4); transition: background .3s;
    }

    /* === STREAMINGS === */
    .streaming-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stream-label {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 12px; border-radius: 12px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
      cursor: pointer; transition: all .2s; font-size: 0.82rem; user-select: none;
    }
    .stream-label:hover { border-color: var(--accent); background: rgba(255,255,255,0.07); }
    .check-box {
      width: 18px; height: 18px; min-width: 18px; border-radius: 5px;
      border: 2px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center; transition: all .2s;
    }
    .check-box svg { width: 11px; height: 11px; display: none; }
    .checked-style { background: var(--accent) !important; border-color: var(--accent) !important; }
    .checked-style svg { display: block !important; }
    .stream-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .stream-nome { flex: 1; }

    /* === BOTÕES === */
    .btn {
      width: 100%; padding: 13px; border: none; border-radius: 14px;
      font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.88rem;
      cursor: pointer; transition: all .25s; text-transform: uppercase; letter-spacing: 1.5px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .btn:active { transform: scale(0.97); }

    .btn-salvar {
      background: rgba(0,255,156,0.08); color: var(--accent);
      border: 1px solid rgba(0,255,156,0.25); margin-top: 14px; transition: all .3s;
    }
    body.modo-serie .btn-salvar {
      background: rgba(168,85,247,0.08);
      border-color: rgba(168,85,247,0.25);
    }
    .btn-salvar:hover { filter: brightness(1.15); }

    .btn-indicar {
      background: linear-gradient(135deg, var(--vermelho), #ff6b35);
      color: #fff; font-size: 1rem; padding: 16px; margin-bottom: 14px;
      box-shadow: 0 4px 20px rgba(255,71,87,0.3);
    }
    .btn-indicar:hover { box-shadow: 0 6px 28px rgba(255,71,87,0.5); transform: translateY(-1px); }
    .btn-indicar:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-assistido {
      background: rgba(0,184,255,0.08); color: var(--azul);
      border: 1px solid rgba(0,184,255,0.25); margin-top: 12px;
    }
    .btn-assistido:hover { background: rgba(0,184,255,0.16); }

    /* === PREFERÊNCIAS ATIVAS === */
    .prefs-ativas {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px; padding: 12px 14px;
      margin-bottom: 14px; display: none;
    }
    .prefs-ativas.show { display: block; }
    .prefs-ativas-titulo {
      font-size: 0.62rem; text-transform: uppercase; letter-spacing: 2px;
      color: var(--texto2); margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }
    .prefs-ativas-titulo svg { width: 11px; height: 11px; }
    .prefs-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .pref-tag {
      font-size: 0.7rem; padding: 3px 10px; border-radius: 20px;
      background: rgba(0,255,156,0.07); border: 1px solid rgba(0,255,156,0.15);
      color: #aaa;
    }
    body.modo-serie .pref-tag {
      background: rgba(168,85,247,0.07); border-color: rgba(168,85,247,0.15);
    }
    .pref-tag strong { color: var(--accent); font-weight: 600; }
    #resultado {
      background: var(--card); border: 1px solid var(--borda);
      border-radius: 20px; padding: 24px; margin-bottom: 14px;
      min-height: 80px; display: flex; align-items: center; justify-content: center;
      text-align: center; transition: border-color .3s;
    }
    .placeholder-txt { color: var(--texto2); font-size: 0.88rem; line-height: 1.6; }

    /* === CARD DO CONTEÚDO === */
    .filme-card { width: 100%; animation: fadeUp .4s ease-out; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    .poster-wrap { position: relative; display: inline-block; margin-bottom: 16px; }
    .poster-wrap img { width: 180px; border-radius: 14px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); display: block; }
    .nota-badge {
      position: absolute; bottom: -10px; right: -10px;
      background: linear-gradient(135deg, #ffcc00, #ff9900);
      color: #000; font-weight: 700; font-size: 0.82rem;
      padding: 5px 10px; border-radius: 10px;
      box-shadow: 0 4px 12px rgba(255,180,0,0.4);
      display: flex; align-items: center; gap: 4px;
    }
    .nota-badge svg { width: 12px; height: 12px; }

    /* badge de tipo (Série / Filme) */
    .tipo-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px;
      padding: 3px 10px; border-radius: 20px; margin-bottom: 8px;
      font-weight: 600;
    }
    .tipo-badge.filme { background: rgba(0,255,156,0.1); color: var(--verde); border: 1px solid rgba(0,255,156,0.2); }
    .tipo-badge.serie { background: rgba(168,85,247,0.12); color: var(--roxo); border: 1px solid rgba(168,85,247,0.25); }
    .tipo-badge svg { width: 10px; height: 10px; }

    .filme-titulo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 1px; margin-bottom: 4px; }
    .filme-ano { font-size: 0.75rem; color: var(--texto2); margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; }
    .filme-sinopse {
      font-size: 0.82rem; color: #aaa; line-height: 1.6; text-align: left;
      max-height: 90px; overflow-y: auto; padding: 10px 12px;
      background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 12px;
    }
    .onde-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 2px; color: var(--texto2); margin-bottom: 8px; }
    .onde-assistir { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; justify-content: center; }
    .provider-tag {
      font-size: 0.72rem; padding: 4px 12px; border-radius: 20px;
      background: rgba(0,255,156,0.07); border: 1px solid rgba(0,255,156,0.18); color: var(--verde);
    }
    body.modo-serie .provider-tag {
      background: rgba(168,85,247,0.07); border-color: rgba(168,85,247,0.2); color: var(--roxo);
    }

    /* === SPINNER === */
    .spinner {
      width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* === LISTA ASSISTIDOS === */
    .assistidos-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .btn-limpar {
      background: none; border: 1px solid rgba(255,71,87,0.3); color: var(--vermelho);
      font-size: 0.65rem; padding: 4px 10px; border-radius: 8px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; letter-spacing: 1px; text-transform: uppercase; transition: all .2s;
    }
    .btn-limpar:hover { background: rgba(255,71,87,0.1); }

    /* sub-abas dentro do card de assistidos */
    .sub-tabs {
      display: flex; gap: 6px; margin-bottom: 12px;
    }
    .sub-tab {
      flex: 1; padding: 7px; border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 600;
      cursor: pointer; transition: all .2s; text-transform: uppercase; letter-spacing: 1px;
      background: rgba(255,255,255,0.04); color: var(--texto2);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .sub-tab svg { width: 12px; height: 12px; }
    .sub-tab.ativo-filme { background: rgba(0,255,156,0.12); color: var(--verde); }
    .sub-tab.ativo-serie { background: rgba(168,85,247,0.14); color: var(--roxo); }

    .lista-assistidos { list-style: none; max-height: 190px; overflow-y: auto; }
    .lista-assistidos::-webkit-scrollbar { width: 3px; }
    .lista-assistidos::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }

    .item-assistido {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 10px; margin-bottom: 5px;
      background: rgba(255,255,255,0.03); border-radius: 10px;
      font-size: 0.8rem; animation: fadeUp .3s ease-out;
    }
    .item-nome { display: flex; align-items: center; gap: 8px; color: var(--texto); }
    .item-nome svg { width: 13px; height: 13px; flex-shrink: 0; }
    .item-nome.is-serie svg { color: var(--roxo); }
    .item-nome.is-filme svg { color: var(--verde); }
    .btn-remover {
      background: none; border: none; cursor: pointer; padding: 2px 6px;
      color: var(--texto2); transition: color .2s; display: flex; align-items: center;
    }
    .btn-remover:hover { color: var(--vermelho); }
    .btn-remover svg { width: 14px; height: 14px; }
    .lista-vazia { color: var(--texto2); font-size: 0.8rem; text-align: center; padding: 14px 0; }

    /* === MODAL === */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.78);
      backdrop-filter: blur(10px); display: none;
      justify-content: center; align-items: center; z-index: 100;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: #13132a; border: 1px solid var(--borda);
      border-radius: 22px; padding: 28px 24px;
      max-width: 300px; width: 90%; text-align: center;
      animation: modalPop .25s ease-out;
    }
    @keyframes modalPop { from { transform:scale(0.85); opacity:0; } to { transform:scale(1); opacity:1; } }
    .modal-icon { margin-bottom: 12px; display: flex; justify-content: center; }
    .modal-icon svg { width: 36px; height: 36px; }
    .modal-msg { font-size: 0.92rem; line-height: 1.55; color: #ccc; margin-bottom: 22px; }
    .modal-btns { display: flex; gap: 10px; justify-content: center; }
    .modal-btns .btn { padding: 10px 22px; font-size: 0.78rem; width: auto; }
    .btn-ok  { background: var(--verde); color: #000; }
    .btn-sim { background: var(--vermelho); color: #fff; }
    .btn-nao { background: rgba(255,255,255,0.07); color: #aaa; border: 1px solid rgba(255,255,255,0.1); }

    /* === TOAST === */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1c1c32; border: 1px solid rgba(255,255,255,0.1);
      padding: 11px 22px; border-radius: 30px;
      font-size: 0.82rem; color: var(--texto);
      transition: transform .3s ease; z-index: 200;
      white-space: nowrap; pointer-events: none;
      display: flex; align-items: center; gap: 8px;
    }
    .toast svg { width: 14px; height: 14px; flex-shrink: 0; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 4px; }
  </style>
</head>

<script>
// ============================================================
//  CONFIG
// ============================================================
const API_KEY = "95dd0fd5e6087234dd7dc6c516ffb45c";

const STREAMINGS = [
  { nome: "Netflix",      id: 8,    cor: "#E50914" },
  { nome: "Amazon Prime", id: 9,    cor: "#00A8E1" },
  { nome: "Disney+",      id: 337,  cor: "#113CCF" },
  { nome: "Max",          id: 1899, cor: "#6B3FA0" },
  { nome: "Apple TV+",    id: 350,  cor: "#A2AAAD" },
  { nome: "Paramount+",   id: 531,  cor: "#0064FF" },
];

const STREAMING_MAP = {
  "Netflix":8, "Amazon Prime Video":9, "Amazon Prime":9,
  "Disney Plus":337, "Disney+":337, "HBO Max":1899, "Max":1899,
  "Apple TV+":350, "Paramount+":531
};

const GENEROS_FILME = [
  { v:"", t:"Todos os Gêneros" }, { v:"28", t:"Ação" }, { v:"35", t:"Comédia" },
  { v:"27", t:"Terror" }, { v:"10749", t:"Romance" }, { v:"878", t:"Ficção Científica" },
  { v:"16", t:"Animação" }, { v:"18", t:"Drama" }, { v:"53", t:"Thriller" }, { v:"12", t:"Aventura" }
];

const GENEROS_SERIE = [
  { v:"", t:"Todos os Gêneros" }, { v:"10759", t:"Ação e Aventura" }, { v:"35", t:"Comédia" },
  { v:"80", t:"Crime" }, { v:"99", t:"Documentário" }, { v:"18", t:"Drama" },
  { v:"10765", t:"Ficção Científica" }, { v:"9648", t:"Mistério" }, { v:"10768", t:"Guerra" },
  { v:"37", t:"Faroeste" }
];

// ============================================================
//  ESTADO
// ============================================================
let modo         = "filme";   // "filme" | "serie"
let subTab       = "filme";   // sub-aba na lista de assistidos
let itemAtual    = null;
let vistosSessao = new Set();

// ============================================================
//  INIT
// ============================================================
function init() {
  buildStreamingGrid();
  atualizarGeneros();
  carregarPreferencias();
  renderizarAssistidos();
  setupRangeNota();
}

function buildStreamingGrid() {
  const grid = document.getElementById("streamingGrid");
  grid.innerHTML = STREAMINGS.map(s => {
    const key = s.nome.replace(/[\s\+]/g, '_');
    return `
      <label class="stream-label" onclick="toggleStream(event,'${s.nome}')">
        <input type="checkbox" value="${s.nome}" style="display:none">
        <div class="check-box" id="chk-${key}">
          <svg><use href="#ic-check"/></svg>
        </div>
        <div class="stream-dot" style="background:${s.cor}"></div>
        <span class="stream-nome">${s.nome}</span>
      </label>`;
  }).join("");
}

function toggleStream(e, nome) {
  const label = e.currentTarget;
  const cb    = label.querySelector("input");
  const key   = nome.replace(/[\s\+]/g, '_');
  const box   = document.getElementById("chk-" + key);
  cb.checked  = !cb.checked;
  cb.checked ? box.classList.add("checked-style") : box.classList.remove("checked-style");
}

function setupRangeNota() {
  const r = document.getElementById("notaMinima");
  r.addEventListener("input", () => {
    document.getElementById("notaValor").textContent = parseFloat(r.value).toFixed(1);
  });
}

function atualizarGeneros() {
  const sel    = document.getElementById("genero");
  const lista  = modo === "filme" ? GENEROS_FILME : GENEROS_SERIE;
  const antigo = sel.value;
  sel.innerHTML = lista.map(g => `<option value="${g.v}">${g.t}</option>`).join("");
  // tenta manter o gênero se existir no novo modo
  if ([...sel.options].some(o => o.value === antigo)) sel.value = antigo;
}

// ============================================================
//  TROCAR MODO (aba principal)
// ============================================================
function trocarModo(novoModo) {
  if (modo === novoModo) return;
  modo = novoModo;

  // visual da aba
  document.getElementById("tabFilme").className = "tab" + (modo === "filme" ? " ativo-filme" : "");
  document.getElementById("tabSerie").className = "tab" + (modo === "serie" ? " ativo-serie" : "");

  // cor do body
  document.body.classList.toggle("modo-serie", modo === "serie");

  // orb 1 muda de cor
  document.querySelector(".orb1").style.background = modo === "serie" ? "#a855f7" : "#00ff9c";

  // atualiza gêneros e texto do botão
  atualizarGeneros();
  document.getElementById("btnIndicarTxt").textContent =
    modo === "filme" ? "Me indique um filme" : "Me indique uma série";

  // limpa resultado
  document.getElementById("resultado").innerHTML =
    `<p class="placeholder-txt">Configure e clique para descobrir uma ${modo === "filme" ? "filme" : "série"}</p>`;

  itemAtual    = null;
  vistosSessao = new Set();
}

// ============================================================
//  SUB-ABA DOS ASSISTIDOS
// ============================================================
function trocarSubTab(tab) {
  subTab = tab;
  document.getElementById("subTabFilme").className = "sub-tab" + (tab === "filme" ? " ativo-filme" : "");
  document.getElementById("subTabSerie").className = "sub-tab" + (tab === "serie" ? " ativo-serie" : "");
  renderizarAssistidos();
}

// ============================================================
//  PREFERÊNCIAS
// ============================================================
function salvarPreferencias() {
  const sel = Array.from(document.querySelectorAll("#streamingGrid input:checked")).map(cb => cb.value);
  if (sel.length === 0) {
    mostrarModal("alert", "Selecione pelo menos um streaming antes de salvar.", "aviso");
    return;
  }
  if (!validarAnos()) return;
  localStorage.setItem("streamings",  JSON.stringify(sel));
  localStorage.setItem("generoPref",  document.getElementById("genero").value);
  localStorage.setItem("anoDe",       document.getElementById("anoDe").value);
  localStorage.setItem("anoAte",      document.getElementById("anoAte").value);
  localStorage.setItem("notaMin",     document.getElementById("notaMinima").value);
  mostrarToast("check", "Preferências salvas com sucesso.");
  atualizarPrefsAtivas();
}

function carregarPreferencias() {
  const saved = JSON.parse(localStorage.getItem("streamings") || "[]");
  document.querySelectorAll("#streamingGrid input").forEach(cb => {
    const match = saved.some(s => s === cb.value || STREAMING_MAP[s] === STREAMING_MAP[cb.value]);
    if (match) {
      cb.checked = true;
      const key  = cb.value.replace(/[\s\+]/g, '_');
      const box  = document.getElementById("chk-" + key);
      if (box) box.classList.add("checked-style");
    }
  });
  const genero = localStorage.getItem("generoPref");
  if (genero) document.getElementById("genero").value = genero;
  const anoDe = localStorage.getItem("anoDe");
  if (anoDe) document.getElementById("anoDe").value = anoDe;
  const anoAte = localStorage.getItem("anoAte");
  if (anoAte) document.getElementById("anoAte").value = anoAte;
  atualizarAnoLabel();
  atualizarPrefsAtivas();
  const nota = localStorage.getItem("notaMin");
  if (nota) {
    document.getElementById("notaMinima").value = nota;
    document.getElementById("notaValor").textContent = parseFloat(nota).toFixed(1);
  }
}

// ============================================================
//  INDICAR — usa APENAS o que foi salvo pelo usuário
// ============================================================
async function indicar() {
  // ── 1. Verifica se há preferências salvas ──────────────────
  const prefSalva = localStorage.getItem("streamings");
  if (!prefSalva) {
    mostrarModal("alert", "Configure e salve suas preferências antes de pedir uma indicação.", "aviso");
    return;
  }

  const favoritos = JSON.parse(prefSalva);
  if (favoritos.length === 0) {
    mostrarModal("alert", "Selecione pelo menos um streaming nas preferências e salve.", "aviso");
    return;
  }

  // ── 2. Detecta se há alterações não salvas na tela ─────────
  const telaSalva = {
    streamings: JSON.stringify(
      Array.from(document.querySelectorAll("#streamingGrid input:checked")).map(cb => cb.value)
    ),
    genero:  document.getElementById("genero").value,
    anoDe:   document.getElementById("anoDe").value.trim(),
    anoAte:  document.getElementById("anoAte").value.trim(),
    notaMin: document.getElementById("notaMinima").value,
  };

  const prefAtual = {
    streamings: JSON.stringify(favoritos),
    genero:  localStorage.getItem("generoPref")  || "",
    anoDe:   localStorage.getItem("anoDe")       || "",
    anoAte:  localStorage.getItem("anoAte")      || "",
    notaMin: localStorage.getItem("notaMin")     || "6",
  };

  const temAlteracao = Object.keys(prefAtual).some(k => telaSalva[k] !== prefAtual[k]);

  if (temAlteracao) {
    mostrarModal(
      "alert",
      "Você tem alterações não salvas. Salve suas preferências antes de continuar.",
      "confirmacao",
      salvarEIndicar
    );
    // Troca texto dos botões do modal para este contexto
    setTimeout(() => {
      const [btnSim] = document.querySelectorAll("#modalBtns .btn-sim");
      const [btnNao] = document.querySelectorAll("#modalBtns .btn-nao");
      if (btnSim) { btnSim.innerHTML = `<svg><use href="#ic-save"/></svg> Salvar e indicar`; }
      if (btnNao) btnNao.textContent = "Cancelar";
    }, 10);
    return;
  }

  await buscarEIndicar();
}

async function salvarEIndicar() {
  // salva silenciosamente sem mostrar toast, depois indica
  const sel = Array.from(document.querySelectorAll("#streamingGrid input:checked")).map(cb => cb.value);
  if (!validarAnos()) return;
  localStorage.setItem("streamings", JSON.stringify(sel));
  localStorage.setItem("generoPref", document.getElementById("genero").value);
  localStorage.setItem("anoDe",      document.getElementById("anoDe").value.trim());
  localStorage.setItem("anoAte",     document.getElementById("anoAte").value.trim());
  localStorage.setItem("notaMin",    document.getElementById("notaMinima").value);
  mostrarToast("check", "Preferências salvas. Buscando...");
  atualizarPrefsAtivas();
  await buscarEIndicar();
}

async function buscarEIndicar() {
  // ── Lê TUDO do localStorage — fonte única da verdade ───────
  const favoritos = JSON.parse(localStorage.getItem("streamings") || "[]");
  const generoId  = localStorage.getItem("generoPref") || "";
  const anoDe     = localStorage.getItem("anoDe")      || "";
  const anoAte    = localStorage.getItem("anoAte")     || "";
  const notaMin   = parseFloat(localStorage.getItem("notaMin")) || 0;

  const btn = document.getElementById("btnIndicar");
  btn.disabled = true;
  btn.innerHTML = `<svg><use href="#ic-search"/></svg> Buscando...`;

  const resultado = document.getElementById("resultado");
  resultado.innerHTML = '<div class="spinner"></div>';

  const isSerie   = modo === "serie";
  const endpoint  = isSerie ? "tv" : "movie";
  const chaveData = isSerie ? "first_air_date" : "release_date";

  try {
    const assistidosSalvos = JSON.parse(localStorage.getItem("assistidos") || "[]");
    const ignorados = new Set([
      ...vistosSessao,
      ...assistidosSalvos.filter(a => a.tipo === modo).map(a => a.id)
    ]);

    const providerIds = favoritos.map(n => STREAMING_MAP[n]).filter(Boolean).join("|");

    let item = null, tentativas = 0;

    while (!item && tentativas < 8) {
      tentativas++;
      // Varia entre páginas 1–10 para ter mais diversidade de resultados
      const pagina = Math.floor(Math.random() * 10) + 1;

      let url = `https://api.themoviedb.org/3/discover/${endpoint}?api_key=${API_KEY}`
        + `&language=pt-BR&sort_by=popularity.desc`
        + `&watch_region=BR&with_watch_providers=${providerIds}`
        + `&vote_average.gte=${notaMin}&page=${pagina}`;

      if (generoId) url += `&with_genres=${generoId}`;
      if (anoDe)    url += `&${chaveData}.gte=${anoDe}-01-01`;
      if (anoAte)   url += `&${chaveData}.lte=${anoAte}-12-31`;

      const resp = await fetch(url);
      const dados = await resp.json();

      // Validação dupla no cliente — garante que a API não escapou do filtro de ano
      const anoDe_num  = anoDe  ? parseInt(anoDe)  : null;
      const anoAte_num = anoAte ? parseInt(anoAte) : null;

      const cands = (dados.results || []).filter(r => {
        if (!r.poster_path) return false;
        if (ignorados.has(r.id)) return false;

        // Extrai o ano do campo correto dependendo do tipo
        const campoData = isSerie ? r.first_air_date : r.release_date;
        if (anoDe_num || anoAte_num) {
          if (!campoData) return false; // sem data → rejeita quando há filtro de ano
          const anoFilme = parseInt(campoData.split("-")[0]);
          if (isNaN(anoFilme)) return false;
          if (anoDe_num  && anoFilme < anoDe_num)  return false;
          if (anoAte_num && anoFilme > anoAte_num) return false;
        }
        return true;
      });

      if (cands.length > 0) item = cands[Math.floor(Math.random() * cands.length)];
    }

    if (!item) {
      resultado.innerHTML = `<p class="placeholder-txt">Nenhum resultado encontrado com essas preferências.<br>Tente ajustar os filtros salvos.</p>`;
      return;
    }

    vistosSessao.add(item.id);

    // Verificação final — confirma que o ano do item está dentro do range salvo
    const campoDataFinal = isSerie ? item.first_air_date : item.release_date;
    if (campoDataFinal && (anoDe || anoAte)) {
      const anoItem = parseInt(campoDataFinal.split("-")[0]);
      if ((anoDe && anoItem < parseInt(anoDe)) || (anoAte && anoItem > parseInt(anoAte))) {
        resultado.innerHTML = `<p class="placeholder-txt">Não encontramos títulos dentro do período <strong>${anoDe || "—"} a ${anoAte || "—"}</strong> com essas preferências.<br>Tente ampliar o intervalo de anos ou mudar o gênero.</p>`;
        return;
      }
    }

    const pResp  = await fetch(`https://api.themoviedb.org/3/${endpoint}/${item.id}/watch/providers?api_key=${API_KEY}`);
    const pDados = await pResp.json();
    const provs  = pDados.results?.BR?.flatrate || [];

    const titulo = isSerie ? item.name : item.title;
    const data   = isSerie ? item.first_air_date : item.release_date;

    itemAtual = { id: item.id, titulo, tipo: modo };
    mostrarItem(item, provs, titulo, data, isSerie);

  } catch (e) {
    console.error(e);
    resultado.innerHTML = `<p class="placeholder-txt">Erro de conexão. Verifique sua internet e tente novamente.</p>`;
  } finally {
    btn.disabled = false;
    const txt = modo === "filme" ? "Indicar outro filme" : "Indicar outra série";
    btn.innerHTML = `<svg><use href="#ic-shuffle"/></svg> ${txt}`;
  }
}

// ============================================================
//  MOSTRAR ITEM
// ============================================================
function mostrarItem(item, provs, titulo, data, isSerie) {
  const resultado = document.getElementById("resultado");
  const tags = provs.length > 0
    ? provs.map(p => `<span class="provider-tag">${p.provider_name}</span>`).join("")
    : `<span class="provider-tag">Seus streamings</span>`;

  const ano     = data ? data.split("-")[0] : "";
  const sinopse = item.overview || "Sinopse não disponível em português.";
  const icone   = isSerie ? "#ic-monitor" : "#ic-film";
  const tipoTxt = isSerie ? "Série" : "Filme";
  const tipoCls = isSerie ? "serie" : "filme";
  const btnTxt  = isSerie ? "Já assisti essa série" : "Já assisti esse filme";

  resultado.innerHTML = `
    <div class="filme-card">
      <div class="poster-wrap">
        <img src="https://image.tmdb.org/t/p/w500${item.poster_path}" alt="${titulo}">
        <div class="nota-badge">
          <svg style="color:#000"><use href="#ic-star"/></svg>
          ${item.vote_average.toFixed(1)}
        </div>
      </div>
      <div class="tipo-badge ${tipoCls}">
        <svg><use href="${icone}"/></svg>
        ${tipoTxt}
      </div>
      <div class="filme-titulo">${titulo}</div>
      <div class="filme-ano">${ano}</div>
      <div class="filme-sinopse">${sinopse}</div>
      <div class="onde-label">Disponível em</div>
      <div class="onde-assistir">${tags}</div>
      <button class="btn btn-assistido" onclick="marcarAssistido()">
        <svg><use href="#ic-check"/></svg>
        ${btnTxt}
      </button>
    </div>
  `;
}

// ============================================================
//  ASSISTIDOS
// ============================================================
function marcarAssistido() {
  if (!itemAtual) return;
  let lista = JSON.parse(localStorage.getItem("assistidos") || "[]");
  if (lista.some(a => a.id === itemAtual.id && a.tipo === itemAtual.tipo)) {
    mostrarToast("alert", "Este item já está na sua lista.");
    return;
  }
  lista.push(itemAtual);
  localStorage.setItem("assistidos", JSON.stringify(lista));
  // muda a sub-aba para o tipo do item marcado
  subTab = itemAtual.tipo;
  document.getElementById("subTabFilme").className = "sub-tab" + (subTab === "filme" ? " ativo-filme" : "");
  document.getElementById("subTabSerie").className = "sub-tab" + (subTab === "serie" ? " ativo-serie" : "");
  renderizarAssistidos();
  const msg = itemAtual.tipo === "serie"
    ? `"${itemAtual.titulo}" adicionada à lista de séries.`
    : `"${itemAtual.titulo}" adicionado à lista de filmes.`;
  mostrarToast("check", msg);
}

function removerAssistido(id, tipo) {
  let lista = JSON.parse(localStorage.getItem("assistidos") || "[]");
  lista = lista.filter(a => !(a.id === id && a.tipo === tipo));
  localStorage.setItem("assistidos", JSON.stringify(lista));
  renderizarAssistidos();
  mostrarToast("check", "Removido da lista.");
}

function renderizarAssistidos() {
  const todos  = JSON.parse(localStorage.getItem("assistidos") || "[]");
  const lista  = todos.filter(a => a.tipo === subTab);
  const el     = document.getElementById("listaAssistidos");
  const vazio  = subTab === "filme" ? "Nenhum filme marcado ainda." : "Nenhuma série marcada ainda.";

  if (lista.length === 0) {
    el.innerHTML = `<li class="lista-vazia">${vazio}</li>`;
    return;
  }

  const icone = subTab === "serie" ? "#ic-monitor" : "#ic-film";
  const cls   = subTab === "serie" ? "is-serie" : "is-filme";

  el.innerHTML = lista.map(a => `
    <li class="item-assistido">
      <div class="item-nome ${cls}">
        <svg><use href="${icone}"/></svg>
        ${a.titulo}
      </div>
      <button class="btn-remover" onclick="removerAssistido(${a.id},'${a.tipo}')" title="Remover">
        <svg><use href="#ic-x"/></svg>
      </button>
    </li>
  `).join("");
}

function abrirModalLimpar() {
  const todos  = JSON.parse(localStorage.getItem("assistidos") || "[]");
  const lista  = todos.filter(a => a.tipo === subTab);
  if (lista.length === 0) { mostrarToast("alert", "A lista já está vazia."); return; }
  const tipo = subTab === "filme" ? "filmes" : "séries";
  mostrarModal("trash", `Deseja limpar toda a lista de ${tipo} assistidos?`, "confirmacao", () => {
    const restantes = todos.filter(a => a.tipo !== subTab);
    localStorage.setItem("assistidos", JSON.stringify(restantes));
    renderizarAssistidos();
    mostrarToast("check", `Lista de ${tipo} limpa com sucesso.`);
  });
}

// ============================================================
//  MODAL
// ============================================================
const ICON_MAP = { alert:"#ic-alert", trash:"#ic-trash", check:"#ic-check" };

function mostrarModal(icone, mensagem, tipo = "aviso", callback = null) {
  const ref = ICON_MAP[icone] || "#ic-alert";
  document.getElementById("modalIcon").innerHTML =
    `<svg style="color:var(--accent)"><use href="${ref}"/></svg>`;
  document.getElementById("modalMsg").textContent = mensagem;

  const btns = document.getElementById("modalBtns");
  btns.innerHTML = "";

  if (tipo === "confirmacao") {
    const sim = document.createElement("button");
    sim.innerHTML = `<svg><use href="#ic-trash"/></svg> Limpar`;
    sim.className = "btn btn-sim";
    sim.onclick = () => { fecharModal(); if (callback) callback(); };
    const nao = document.createElement("button");
    nao.textContent = "Cancelar"; nao.className = "btn btn-nao";
    nao.onclick = fecharModal;
    btns.appendChild(sim); btns.appendChild(nao);
  } else {
    const ok = document.createElement("button");
    ok.textContent = "Entendido"; ok.className = "btn btn-ok";
    ok.onclick = fecharModal;
    btns.appendChild(ok);
  }
  document.getElementById("modal").classList.add("show");
}

function fecharModal() { document.getElementById("modal").classList.remove("show"); }
document.getElementById("modal").addEventListener("click", e => {
  if (e.target === document.getElementById("modal")) fecharModal();
});

// ============================================================
//  TOAST
// ============================================================
let toastTimer;
function mostrarToast(icone, msg) {
  const ref = ICON_MAP[icone] || "#ic-check";
  document.getElementById("toastIconUse").setAttribute("href", ref);
  document.getElementById("toastMsg").textContent = msg;
  const t = document.getElementById("toast");
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2800);
}

function atualizarPrefsAtivas() {
  const streamings = JSON.parse(localStorage.getItem("streamings") || "[]");
  const generoId   = localStorage.getItem("generoPref") || "";
  const anoDe      = localStorage.getItem("anoDe")  || "";
  const anoAte     = localStorage.getItem("anoAte") || "";
  const notaMin    = localStorage.getItem("notaMin") || "";

  const div = document.getElementById("prefsAtivas");
  const tags = document.getElementById("prefsTags");

  if (streamings.length === 0) { div.classList.remove("show"); return; }

  const itens = [];

  // streamings
  itens.push(`<span class="pref-tag"><strong>Streaming:</strong> ${streamings.join(", ")}</span>`);

  // gênero
  const todosGen = [...GENEROS_FILME, ...GENEROS_SERIE];
  const genNome  = todosGen.find(g => g.v === generoId)?.t;
  if (genNome && generoId) itens.push(`<span class="pref-tag"><strong>Gênero:</strong> ${genNome}</span>`);

  // período
  if (anoDe && anoAte)   itens.push(`<span class="pref-tag"><strong>Período:</strong> ${anoDe} — ${anoAte}</span>`);
  else if (anoDe)        itens.push(`<span class="pref-tag"><strong>A partir de:</strong> ${anoDe}</span>`);
  else if (anoAte)       itens.push(`<span class="pref-tag"><strong>Até:</strong> ${anoAte}</span>`);

  // nota
  if (notaMin && parseFloat(notaMin) > 0)
    itens.push(`<span class="pref-tag"><strong>Nota mínima:</strong> ${parseFloat(notaMin).toFixed(1)}</span>`);

  tags.innerHTML = itens.join("");
  div.classList.add("show");
}
function atualizarAnoLabel() {
  const de  = document.getElementById("anoDe").value.trim();
  const ate = document.getElementById("anoAte").value.trim();
  const label = document.getElementById("anoRangeLabel");
  if (de && ate)       label.textContent = `${de} — ${ate}`;
  else if (de)         label.textContent = `A partir de ${de}`;
  else if (ate)        label.textContent = `Até ${ate}`;
  else                 label.textContent = "Qualquer ano";
}

function validarAnos() {
  const de    = parseInt(document.getElementById("anoDe").value) || 0;
  const ate   = parseInt(document.getElementById("anoAte").value) || 0;
  const erro  = document.getElementById("anoErro");
  const inDe  = document.getElementById("anoDe");
  const inAte = document.getElementById("anoAte");
  const anoAtual = new Date().getFullYear();

  // limpa estados anteriores
  inDe.classList.remove("erro");
  inAte.classList.remove("erro");
  erro.classList.remove("show");

  if (de && ate && de > ate) {
    inDe.classList.add("erro");
    inAte.classList.add("erro");
    erro.textContent = "O ano inicial não pode ser maior que o final.";
    erro.classList.add("show");
    return false;
  }
  if (de && (de < 1900 || de > anoAtual)) {
    inDe.classList.add("erro");
    erro.textContent = `Ano inválido. Use entre 1900 e ${anoAtual}.`;
    erro.classList.add("show");
    return false;
  }
  if (ate && (ate < 1900 || ate > anoAtual)) {
    inAte.classList.add("erro");
    erro.textContent = `Ano inválido. Use entre 1900 e ${anoAtual}.`;
    erro.classList.add("show");
    return false;
  }
  return true;
}
